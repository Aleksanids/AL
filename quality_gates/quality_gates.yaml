gates:
  agent_pack_validation:
    command: "python scripts/validate_agent_pack.py"
    required: true
  python_syntax:
    command: "python -m py_compile src/al_python_coding_agent/__init__.py src/al_python_coding_agent/task_model.py src/al_python_coding_agent/policy.py src/al_python_coding_agent/cli.py scripts/validate_agent_pack.py tests/test_agent_pack.py tests/test_core_policy.py"
    required: true
  unit_tests:
    command: "python -m unittest discover -s tests"
    required: true
  diff_check:
    command: "git diff --check"
    required: true
  ruff_format_check:
    command: "python -m ruff format --check ."
    required: false
    skip_reason_if_missing: "ruff is optional until installed in the environment"
  ruff_lint:
    command: "python -m ruff check ."
    required: false
    skip_reason_if_missing: "ruff is optional until installed in the environment"
  type_check:
    command: "python -m mypy scripts tests"
    required: false
    skip_reason_if_missing: "mypy is optional until installed in the environment"
  security_scan:
    command: "bandit -r scripts -q"
    required: false
    skip_reason_if_missing: "bandit is optional until security tooling is installed"
  forbidden_paths_check:
    internal: true
    required: true
  secrets_scan:
    internal: true
    required: true
